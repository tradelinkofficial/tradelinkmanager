<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeLink Manager | Settings</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
    body{min-height:100vh;background:radial-gradient(circle at top,rgba(59,130,246,.18),transparent 34%),linear-gradient(135deg,#0f172a,#111827);color:#f8fafc;padding:18px}
    .container{max-width:1150px;margin:auto}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
    .brand h1{font-size:24px;letter-spacing:1px;text-shadow:0 0 18px rgba(59,130,246,.7)}
    .brand p{font-size:13px;color:#94a3b8;margin-top:4px}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .nav a,.nav button{border:none;text-decoration:none;padding:11px 15px;border-radius:12px;color:#f8fafc;font-size:13px;font-weight:bold;cursor:pointer;transition:.25s;background:rgba(30,41,59,.78);border:1px solid rgba(255,255,255,.06);box-shadow:0 12px 30px rgba(0,0,0,.18)}
    .nav a:hover,.nav button:hover{background:#1e293b;transform:translateY(-1px);box-shadow:0 0 18px rgba(59,130,246,.28)}
    .logoutBtn{background:rgba(239,68,68,.18)!important;color:#fca5a5!important}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:rgba(30,41,59,.78);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.25);backdrop-filter:blur(12px);animation:fadeIn .5s ease}
    .card h3{color:#94a3b8;font-size:13px;margin-bottom:12px;font-weight:normal;letter-spacing:.3px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .badge{display:inline-flex;align-items:center;justify-content:center;padding:4px 8px;border-radius:999px;font-size:10px;font-weight:900;letter-spacing:.2px;background:#f59e0b;color:#111827;white-space:nowrap}
    .row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .row span:first-child{color:#94a3b8}.row span:last-child{font-weight:bold;text-align:right}
    .status-green{color:#22c55e}.status-red{color:#ef4444}.status-blue{color:#3b82f6}.status-orange{color:#f59e0b}
    .signal{display:flex;align-items:center;gap:8px}
    .dot{width:9px;height:9px;border-radius:50%;background:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.8);animation:pulse 1.5s infinite}
    .dot.connected{background:#22c55e;box-shadow:0 0 12px rgba(34,197,94,.8)}
    .password-box{display:flex;flex-direction:column;gap:12px}
    .field{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
    .field label{color:#94a3b8;font-size:13px}
