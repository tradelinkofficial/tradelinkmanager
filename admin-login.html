<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeLink Manager | Admin Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.25), transparent 35%),
        linear-gradient(135deg,#0f172a,#111827);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#f8fafc;
      overflow:hidden;
      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:430px;
      background:rgba(30,41,59,0.74);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:24px;
      padding:34px 28px;
      backdrop-filter:blur(16px);
      box-shadow:0 25px 80px rgba(0,0,0,0.45);
      animation:fadeIn .8s ease;
      position:relative;
      overflow:hidden;
    }

    .login-box:before{
      content:"";
      position:absolute;
      inset:-2px;
      background:radial-gradient(circle at top right, rgba(59,130,246,.18), transparent 35%);
      pointer-events:none;
    }

    .content{
      position:relative;
      z-index:2;
    }

    .logo{
      text-align:center;
      margin-bottom:24px;
    }

    .logo h1{
      font-size:28px;
      letter-spacing:1.5px;
      color:#f8fafc;
      text-shadow:0 0 18px rgba(59,130,246,0.7);
      animation:glow 3s ease-in-out infinite alternate;
    }

    .logo p{
      margin-top:8px;
      font-size:13px;
      color:#94a3b8;
    }

    .admin-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      margin:0 auto 22px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(245,158,11,0.14);
      border:1px solid rgba(245,158,11,0.35);
      color:#f59e0b;
      font-size:12px;
      font-weight:900;
      letter-spacing:.4px;
    }

    .badge-wrap{
      display:flex;
      justify-content:center;
    }

    .form-group{
      margin-bottom:18px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:13px;
      color:#94a3b8;
    }

    input{
      width:100%;
      padding:14px 15px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.08);
      background:#0f172a;
      color:#f8fafc;
      font-size:15px;
      outline:none;
      transition:.25s;
    }

    input:focus{
      border-color:#3b82f6;
      box-shadow:0 0 0 3px rgba(59,130,246,0.18);
    }

    button{
      width:100%;
      margin-top:8px;
      padding:14px;
      border:none;
      border-radius:14px;
      background:#3b82f6;
      color:white;
      font-weight:bold;
      font-size:15px;
      cursor:pointer;
      transition:.25s;
    }

    button:hover{
      background:#2563eb;
      transform:translateY(-1px);
      box-shadow:0 10px 30px rgba(37,99,235,0.35);
    }

    button:disabled{
      background:#64748b;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .error{
      display:none;
      margin-top:16px;
      padding:12px;
      border-radius:12px;
      background:rgba(239,68,68,0.12);
      border:1px solid rgba(239,68,68,0.25);
      color:#fca5a5;
      font-size:13px;
      text-align:center;
      line-height:1.45;
    }

    .footer{
      margin-top:24px;
      text-align:center;
      font-size:12px;
      color:#64748b;
    }

    .security-note{
      margin-top:14px;
      padding:12px;
      border-radius:14px;
      background:rgba(15,23,42,.68);
      border:1px solid rgba(255,255,255,.06);
      color:#94a3b8;
      font-size:12px;
      line-height:1.5;
      text-align:center;
    }

    .status-dot{
      display:inline-block;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#22c55e;
      margin-right:6px;
      box-shadow:0 0 12px rgba(34,197,94,0.9);
      animation:pulse 1.5s infinite;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(18px);}
      to{opacity:1; transform:translateY(0);}
    }

    @keyframes glow{
      from{text-shadow:0 0 10px rgba(59,130,246,0.35);}
      to{text-shadow:0 0 25px rgba(59,130,246,0.9);}
    }

    @keyframes pulse{
      0%{opacity:.45;}
      50%{opacity:1;}
      100%{opacity:.45;}
    }

    @media(max-width:480px){
      .login-box{
        padding:28px 22px;
        border-radius:20px;
      }

      .logo h1{
        font-size:24px;
      }

      input,button{
        font-size:14px;
      }
    }
  </style>
</head>

<body>
  <div class="login-box">
    <div class="content">
      <div class="logo">
        <h1>TRADELINK MANAGER</h1>
        <p><span class="status-dot"></span>Admin Access Panel</p>
      </div>

      <div class="badge-wrap">
        <div class="admin-badge">ADMIN ONLY</div>
      </div>

      <div class="form-group">
        <label>Admin ID</label>
        <input type="text" id="adminId" placeholder="Enter Admin ID" autocomplete="username" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
      </div>

      <button id="loginBtn" onclick="adminLogin()">LOGIN ADMIN</button>

      <div class="error" id="errorBox"></div>

      <div class="security-note">
        Authorized admin access only. Role access will be loaded from Firebase after login.
      </div>

      <div class="footer">
        DARK TRADING PRO Admin v1.00
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://tradelinkmanager-4c8fb-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const existingAdminId = localStorage.getItem("adminId");
    const existingAdminToken = localStorage.getItem("adminSessionToken");

    if(existingAdminId && existingAdminToken){
      window.location.href = "admin.html";
    }

    function showError(message){
      const errorBox = document.getElementById("errorBox");
      errorBox.innerText = message;
      errorBox.style.display = "block";
    }

    function clearError(){
      const errorBox = document.getElementById("errorBox");
      errorBox.innerText = "";
      errorBox.style.display = "none";
    }

    function setLoading(isLoading){
      const loginBtn = document.getElementById("loginBtn");
      loginBtn.disabled = isLoading;
      loginBtn.innerText = isLoading ? "CHECKING..." : "LOGIN ADMIN";
    }

    function clearOldAdminStorage(){
      localStorage.removeItem("adminId");
      localStorage.removeItem("adminName");
      localStorage.removeItem("adminRole");
      localStorage.removeItem("adminStatus");
      localStorage.removeItem("adminSessionToken");
    }

    function generateSessionToken(){
      return "ADMIN_SESSION_" + Date.now() + "_" + Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    window.adminLogin = async function(){
      const adminId = document.getElementById("adminId").value.trim().toUpperCase();
      const password = document.getElementById("password").value;

      clearError();

      if(adminId === "" || password === ""){
        showError("Please enter Admin ID and Password.");
        return;
      }

      setLoading(true);

      try{
        const adminRef = ref(db, "TradeLink/admins/" + adminId);
        const snapshot = await get(adminRef);

        if(!snapshot.exists()){
          clearOldAdminStorage();
          showError("Invalid Admin ID or Password.");
          return;
        }

        const adminData = snapshot.val() || {};
        const adminStatus = adminData.status || "inactive";
        const adminRole = adminData.role || "viewer";

        if(String(adminData.password || "") !== password){
          clearOldAdminStorage();
          showError("Invalid Admin ID or Password.");
          return;
        }

        if(adminStatus !== "active"){
          clearOldAdminStorage();
          showError("Admin account is inactive. Please contact super admin.");
          return;
        }

        const newSessionToken = generateSessionToken();

        await update(adminRef, {
          sessionToken: newSessionToken,
          lastLogin: new Date().toISOString()
        });

        localStorage.setItem("adminId", adminId);
        localStorage.setItem("adminName", adminData.name || "");
        localStorage.setItem("adminRole", adminRole);
        localStorage.setItem("adminStatus", adminStatus);
        localStorage.setItem("adminSessionToken", newSessionToken);

        window.location.href = "admin.html";

      }catch(error){
        console.error(error);
        clearOldAdminStorage();
        showError("Connection error. Please check Firebase rules or internet connection.");
      }finally{
        setLoading(false);
      }
    };

    document.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        window.adminLogin();
      }
    });
  </script>
</body>
</html>
