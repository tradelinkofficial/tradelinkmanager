<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    databaseURL:"https://tradelinkmanager-4c8fb-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const clientId = localStorage.getItem("clientId");
  const localToken = localStorage.getItem("sessionToken") || "";

  if(!clientId){
    window.location.href = "index.html";
  }

  // =========================
  // SESSION VALIDATION
  // =========================
  const sessionRef = ref(db, "TradeLink/users/" + clientId + "/sessionToken");

  onValue(sessionRef, (snapshot) => {
    const firebaseToken = snapshot.val() || "";

    if(localToken !== firebaseToken){
      localStorage.clear();
      window.location.href = "index.html";
    }
  });

  // =========================
  // LOGOUT
  // =========================
  window.logout = function(){
    localStorage.clear();
    window.location.href = "index.html";
  };
</script>
